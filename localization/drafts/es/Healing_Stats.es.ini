[tooltips]
details_entry_format=Formato de los datos mostrados (estadísticas por entrada).\n{1}: Curación\n{2}: Ticks\n{3}: Lanzamientos (aún no implementado)\n{4}: Curación por segundo\n{5}: Curación por tick\n{6}: Curación por lanzamiento (aún no implementado)\n{7}: Porcentaje de la curación total\n
data_source=Decide qué datos se muestran en la ventana
sort_order=Decide cómo se ordenan objetivos y habilidades en las secciones 'Objetivos' y 'Habilidades'.
combat_end=Decide qué se usa para determinar el fin del combate\ny, por tanto, el tiempo en combate
draw_bars=Muestra una barra de color bajo cada entrada que indica el valor\nde esa entrada en proporción a la entrada mayor
short_name=Nombre usado para representar esta ventana en el menú "heal stats"
max_name_length=Recorta los nombres mostrados a este número de caracteres. 0 desactiva, -1 oculta
min_displayed=Cantidad mínima de líneas de datos que mostrar en esta ventana.
max_displayed=Cantidad máxima de líneas de datos que mostrar en esta ventana. 0 sin límite
stats_format_with_percent=Formato de los datos mostrados (estadísticas por entrada).\n{1}: Curación\n{2}: Ticks\n{3}: Lanzamientos (aún no implementado)\n{4}: Curación por segundo\n{5}: Curación por tick\n{6}: Curación por lanzamiento (aún no implementado)\n{7}: Porcentaje de la curación total
stats_format=Formato de los datos mostrados (estadísticas por entrada).\n{1}: Curación\n{2}: Ticks\n{3}: Lanzamientos (aún no implementado)\n{4}: Curación por segundo\n{5}: Curación por tick\n{6}: Curación por lanzamiento (aún no implementado)
title_bar_format=Formato del título de esta ventana.\n{1}: Curación total\n{2}: Ticks totales\n{3}: Lanzamientos totales (aún no implementado)\n{4}: Curación por segundo\n{5}: Curación por tick\n{6}: Curación por lanzamiento (aún no implementado)\n{7}: Tiempo en combate
title_bar_format_totals=Formato del título de esta ventana.\n{1}: Tiempo en combate
window_width=Usa 0 para redimensionar el ancho dinámicamente
window_hotkey=Valor numérico (código de tecla virtual) de la tecla\nusada para abrir y cerrar esta ventana
debug_mode=Incluye datos de debug en nombres de objetivos y habilidades.\nActívalo antes de sacar capturas de posibles problemas de cálculo.
debug_logging=Si no está en desactivado, activa el registro al nivel indicado.\nLos logs se guardan en addons\\logs\\arcdps_healing_stats\\. El registro\ntendrá un pequeño impacto en el rendimiento.
enable_live_stats_sharing=Comparte estadísticas de curación en vivo con otros\njugadores de tu escuadrón. Esto se hace mediante un servidor central\n(ver opción inferior). Tras activarlo, puede que no funcione\ncorrectamente hasta cambiar de instancia de mapa para detectar bien\na todos los miembros del escuadrón.\n\nLas stats compartidas por otros jugadores se pueden ver en una\nventana de heal stats con su fuente de datos en "%s"\n\nActivar esta opción tiene un pequeño impacto en el rendimiento y\nañade algo de carga a tu conexión (máximo aproximado de\n10 kiB/s de subida y 100 kiB/s de bajada). El uso de bajada\naumenta cuantos más jugadores del escuadrón tengan stats en vivo\nactivadas; el uso de subida\nno.
live_stats_budget_mode=Solo envía a los compañeros un subconjunto mínimo de eventos. Esto reduce\nla cantidad de ancho de banda de subida usado por el addon. Las\nestadísticas de curación mostradas seguirán siendo precisas, pero el tiempo\nen combate puede ser ligeramente incorrecto visto por compañeros durante el combate.\nSi el compañero usa una versión del addon anterior al soporte de esta opción,\nel tiempo en combate puede ser muy incorrecto incluso después de terminar el encuentro.\nEsta opción no reduce el uso de ancho de banda de bajada, solo el de subida.\nCon esta opción activada, el uso esperado de subida\nes <1kiB/s.
live_stats_disable_encryption=Por defecto, todos los mensajes hacia y desde el servidor de stats en vivo\nse cifran con TLS. Esta opción desactiva el cifrado. Puede ser útil para\nevitar conflictos con algunos programas de seguridad o reducir el uso de CPU\nde las stats en vivo.
sharing_hotkey=Valor numérico (código de tecla virtual) de la tecla\nusada para activar o desactivar las stats en vivo
evtc_rpc_server=Servidor usado para la comunicación evtc_rpc\n(permite que otros jugadores de tu escuadrón vean tus stats de curación).\nTodos los eventos de combate locales se enviarán a este servidor,\nasí que asegúrate de confiar en el servidor.
reset_options=Restablece todas las opciones globales y de ventana a sus valores predeterminados.

