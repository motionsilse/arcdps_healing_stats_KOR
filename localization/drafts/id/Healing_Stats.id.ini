[tooltips]
details_entry_format=Format data yang ditampilkan (stats per entri).\n{1}: Heal\n{2}: Tick\n{3}: Cast (belum diimplementasi)\n{4}: Heal per detik\n{5}: Heal per tick\n{6}: Heal per cast (belum diimplementasi)\n{7}: Persen dari total heal\n
data_source=Menentukan data yang ditampilkan di window
sort_order=Menentukan cara target dan skill diurutkan di bagian 'Target' dan 'Skill'.
combat_end=Menentukan apa yang dipakai untuk menentukan akhir\ncombat (dan akibatnya waktu dalam combat)
draw_bars=Tampilkan bar warna di bawah tiap entri untuk menunjukkan nilai\nentri itu dibanding entri terbesar
short_name=Nama untuk window ini di menu "heal stats"
max_name_length=Potong nama yang ditampilkan sampai jumlah karakter ini. Set 0 untuk menonaktifkan, -1 untuk menyembunyikan
min_displayed=Jumlah minimum baris data yang ditampilkan di window ini.
max_displayed=Jumlah maksimum baris data yang ditampilkan di window ini. Set 0 untuk tanpa batas
stats_format_with_percent=Format data yang ditampilkan (stats per entri).\n{1}: Heal\n{2}: Tick\n{3}: Cast (belum diimplementasi)\n{4}: Heal per detik\n{5}: Heal per tick\n{6}: Heal per cast (belum diimplementasi)\n{7}: Persen dari total heal
stats_format=Format data yang ditampilkan (stats per entri).\n{1}: Heal\n{2}: Tick\n{3}: Cast (belum diimplementasi)\n{4}: Heal per detik\n{5}: Heal per tick\n{6}: Heal per cast (belum diimplementasi)
title_bar_format=Format judul window ini.\n{1}: Total heal\n{2}: Total tick\n{3}: Total cast (belum diimplementasi)\n{4}: Heal per detik\n{5}: Heal per tick\n{6}: Heal per cast (belum diimplementasi)\n{7}: Waktu dalam combat
title_bar_format_totals=Format judul window ini.\n{1}: Waktu dalam combat
window_width=Set 0 untuk resize lebar dinamis
window_hotkey=Nilai numerik (virtual key code) untuk tombol\nyang dipakai membuka/menutup window
debug_mode=Memasukkan data debug ke nama target dan skill.\nAktifkan sebelum mengambil screenshot untuk isu kalkulasi potensial.
debug_logging=Jika bukan off, aktifkan logging pada level log yang dipilih.\nLog disimpan di addons\\logs\\arcdps_healing_stats\\. Logging\nakan berdampak kecil pada performa.
enable_live_stats_sharing=Mengaktifkan berbagi live stats penyembuhan dengan\npemain lain di squad Anda. Fitur ini berjalan lewat server pusat\n(lihat opsi di bawah). Setelah diaktifkan, fitur ini mungkin belum\nberfungsi benar sampai instance map diganti agar semua anggota squad\nterdeteksi dengan benar.\n\nStats dari pemain lain dapat dilihat lewat window\nheal stats dengan sumber data disetel ke "%s"\n\nMengaktifkan opsi ini berdampak kecil pada performa, dan\nmenambah beban pada koneksi Anda (maksimum sekitar\n10 kiB/s upload dan 100 kiB/s download). Pemakaian\nkoneksi download naik saat lebih banyak pemain di squad\nmengaktifkan berbagi live stats; pemakaian koneksi upload\ntidak naik.
live_stats_budget_mode=Hanya kirim subset event minimal ke peer. Ini mengurangi\njumlah bandwidth upload yang dipakai addon. Stats heal\nyang ditampilkan tetap akurat, tetapi waktu dalam combat bisa\nsedikit salah saat dilihat peer selama combat. Jika peer\nmemakai versi addon yang lebih lama dari dukungan opsi ini,\nwaktu dalam combat bisa sangat salah bahkan\nsetelah encounter selesai. Opsi ini tidak mengurangi\nbandwidth download, hanya bandwidth upload. Dengan opsi ini\naktif, pemakaian koneksi upload yang diharapkan <1kiB/s.
live_stats_disable_encryption=Secara default, semua pesan ke/dari server berbagi live stats\ndienkripsi dengan TLS. Opsi ini mematikan enkripsi. Ini\nberguna untuk menghindari konflik dengan software keamanan,\natau mengurangi penggunaan CPU berbagi live stats.
sharing_hotkey=Nilai numerik (virtual key code) untuk tombol\nyang dipakai toggle berbagi live stats on/off
evtc_rpc_server=Server untuk komunikasi evtc_rpc\n(mengizinkan pemain lain di squad melihat stats heal Anda).\nSemua event combat lokal akan dikirim ke server ini,\njadi pastikan servernya tepercaya.
reset_options=Reset semua opsi global dan opsi khusus window ke default.

