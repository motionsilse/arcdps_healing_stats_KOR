[tooltips]
details_entry_format=Format ng ipinapakitang data (stats ay per entry).\n{1}: Healing\n{2}: Ticks\n{3}: Casts (hindi pa implemented)\n{4}: Healing per second\n{5}: Healing per tick\n{6}: Healing per cast (hindi pa implemented)\n{7}: Percent ng total healing\n
data_source=Pinipili kung anong data ang ipinapakita sa window
sort_order=Pinipili kung paano i-sort ang targets at skills sa 'Targets' at 'Skills' sections.
combat_end=Pinipili kung ano ang gagamitin sa pagtukoy ng combat\nend (at dahil dito, time in combat)
draw_bars=Magpakita ng colored bar sa ilalim ng bawat entry na nagsasaad kung ano\nang value ng entry na iyon kumpara sa largest entry
short_name=Pangalan na gamit para tukuyin ang window na ito sa "heal stats" menu
max_name_length=Putulin ang displayed names sa ganitong dami ng characters. Set sa 0 para i-disable, -1 para itago
min_displayed=Minimum na dami ng data lines na ipapakita sa window na ito.
max_displayed=Maximum na dami ng data lines na ipapakita sa window na ito. Set sa 0 para walang limit
stats_format_with_percent=Format ng ipinapakitang data (stats ay per entry).\n{1}: Healing\n{2}: Ticks\n{3}: Casts (hindi pa implemented)\n{4}: Healing per second\n{5}: Healing per tick\n{6}: Healing per cast (hindi pa implemented)\n{7}: Percent ng total healing
stats_format=Format ng ipinapakitang data (stats ay per entry).\n{1}: Healing\n{2}: Ticks\n{3}: Casts (hindi pa implemented)\n{4}: Healing per second\n{5}: Healing per tick\n{6}: Healing per cast (hindi pa implemented)
title_bar_format=Format ng title ng window na ito.\n{1}: Total healing\n{2}: Total ticks\n{3}: Total casts (hindi pa implemented)\n{4}: Healing per second\n{5}: Healing per tick\n{6}: Healing per cast (hindi pa implemented)\n{7}: Time in combat
title_bar_format_totals=Format ng title ng window na ito.\n{1}: Time in combat
window_width=Set sa 0 para dynamic ang width resize
window_hotkey=Numerical value (virtual key code) para sa key\nna gamit sa pag-open at pag-close ng window na ito
debug_mode=May kasamang debug data sa target at skill names.\nI-on ito bago kumuha ng screenshots ng posibleng calculation issues.
debug_logging=Kapag hindi naka-off, nag-e-enable ng logging sa napiling log level.\nLogs ay sine-save sa addons\\logs\\arcdps_healing_stats\\. May maliit\nna impact sa performance ang logging.
enable_live_stats_sharing=Nag-e-enable ng live sharing ng healing stats sa ibang\nplayer sa squad mo. Dumadaan ito sa central server\n(tingnan ang option sa ibaba). Pag na-enable, maaaring hindi\nito gumana nang tama hanggang magpalit ng map instance para lahat ng squad\nmembers ay ma-detect nang tama.\n\nAng stats mula sa ibang player ay makikita sa\nheal stats window na ang data source ay "%s"\n\nMay maliit na impact sa performance ang option na ito at\nmagdadagdag ng load sa connection mo (maximum na humigit-kumulang\n10 kiB/s up at 100 kiB/s down). Ang download\nconnection usage ay tumataas habang mas maraming player sa squad mo ang\nmay enabled na live stats sharing; ang upload connection usage\nay hindi.
live_stats_budget_mode=Magpadala lang ng minimal subset ng events sa peers. Binabawasan nito\nang upload bandwidth na ginagamit ng addon. Ang ipinapakitang healing\nstats ay accurate pa rin, pero ang time in combat ay maaaring\nbahagyang mali kapag nakikita ng peers habang nasa combat. Kung ang peer\nay gumagamit ng addon version na mas luma kaysa support para sa\noption na ito, maaaring malaki ang mali ng time in combat kahit\ntapos na ang encounter. Hindi binabawasan ng option na ito ang\ndownload bandwidth usage, upload bandwidth lang. Kapag enabled ang\noption na ito, ang expected upload connection usage ay <1kiB/s.
live_stats_disable_encryption=Bilang default, lahat ng messages papunta at mula sa live stats sharing server\nay encrypted gamit ang TLS. Dini-disable ng option na ito ang encryption. Maaari itong\nmakatulong para iwas-conflict sa ilang security software,\no bawasan ang CPU usage ng live stats sharing.
sharing_hotkey=Numerical value (virtual key code) para sa key\nna gamit sa pag-toggle ng live stats sharing on/off
evtc_rpc_server=Server na gagamitin para sa evtc_rpc communication\n(pinapayagan ang ibang player sa squad na makita ang healing stats mo).\nLahat ng local combat events ay ipapadala sa server na ito,\nkaya siguraduhing pinagkakatiwalaan mo ang server.
reset_options=I-reset lahat ng global options at window-specific options pabalik sa defaults.

