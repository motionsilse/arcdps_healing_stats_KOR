[tooltips]
details_entry_format=รูปแบบข้อมูลที่แสดง (stats ต่อรายการ).\n{1}: ฮีล\n{2}: Tick\n{3}: Cast (ยังไม่ใช้)\n{4}: ฮีลต่อวินาที\n{5}: ฮีลต่อ tick\n{6}: ฮีลต่อ cast (ยังไม่ใช้)\n{7}: เปอร์เซ็นต์ของฮีลรวม\n
data_source=กำหนดว่าหน้าต่างนี้แสดงข้อมูลใด
sort_order=กำหนดการเรียงเป้าหมายและสกิลในส่วน 'เป้าหมาย' และ 'สกิล'.
combat_end=กำหนดสิ่งที่ใช้ตัดสินจบ combat\n(และเวลาที่อยู่ใน combat)
draw_bars=แสดงแถบสีใต้แต่ละรายการเพื่อบอกสัดส่วนค่าของ\nรายการนั้นเทียบกับรายการที่มากที่สุด
short_name=ชื่อที่ใช้แทนหน้าต่างนี้ในเมนู "สถิติฮีล"
max_name_length=ตัดชื่อที่แสดงให้เหลือจำนวนอักขระนี้ ตั้ง 0 เพื่อปิด, -1 เพื่อซ่อน
min_displayed=จำนวนบรรทัดข้อมูลขั้นต่ำที่จะแสดงในหน้าต่างนี้.
max_displayed=จำนวนบรรทัดข้อมูลสูงสุดที่จะแสดงในหน้าต่างนี้ ตั้ง 0 เพื่อไม่จำกัด
stats_format_with_percent=รูปแบบข้อมูลที่แสดง (stats ต่อรายการ).\n{1}: ฮีล\n{2}: Tick\n{3}: Cast (ยังไม่ใช้)\n{4}: ฮีลต่อวินาที\n{5}: ฮีลต่อ tick\n{6}: ฮีลต่อ cast (ยังไม่ใช้)\n{7}: เปอร์เซ็นต์ของฮีลรวม
stats_format=รูปแบบข้อมูลที่แสดง (stats ต่อรายการ).\n{1}: ฮีล\n{2}: Tick\n{3}: Cast (ยังไม่ใช้)\n{4}: ฮีลต่อวินาที\n{5}: ฮีลต่อ tick\n{6}: ฮีลต่อ cast (ยังไม่ใช้)
title_bar_format=รูปแบบชื่อหน้าต่างนี้.\n{1}: ฮีลรวม\n{2}: Tick รวม\n{3}: Cast รวม (ยังไม่ใช้)\n{4}: ฮีลต่อวินาที\n{5}: ฮีลต่อ tick\n{6}: ฮีลต่อ cast (ยังไม่ใช้)\n{7}: เวลาใน combat
title_bar_format_totals=รูปแบบชื่อหน้าต่างนี้.\n{1}: เวลาใน combat
window_width=ตั้ง 0 เพื่อปรับความกว้างแบบไดนามิก
window_hotkey=ค่าตัวเลข (virtual key code) ของปุ่ม\nที่ใช้เปิดและปิดหน้าต่างนี้
debug_mode=ใส่ข้อมูล debug ในชื่อเป้าหมายและสกิล.\nเปิดก่อนถ่าย screenshot ของปัญหาการคำนวณที่อาจเกิดขึ้น.
debug_logging=ถ้าไม่ใช่ off จะเปิด logging ที่ระดับ log ที่เลือก.\nLog จะถูกบันทึกที่ addons\\logs\\arcdps_healing_stats\\. Logging\nมีผลเล็กน้อยต่อ performance.
enable_live_stats_sharing=เปิดแชร์ live stats การฮีลกับ\nผู้เล่นคนอื่นใน squad ของคุณ ฟีเจอร์นี้ทำผ่านเซิร์ฟเวอร์กลาง\n(ดูตัวเลือกด้านล่าง). หลังเปิดแชร์ live stats อาจยัง\nทำงานไม่ถูกต้องจนกว่าจะเปลี่ยน map instance เพื่อให้ตรวจพบ\nสมาชิก squad ทุกคนอย่างถูกต้อง.\n\nStats จากผู้เล่นคนอื่นดูได้ผ่านหน้าต่าง\nสถิติฮีลที่ตั้ง data source เป็น "%s"\n\nการเปิดตัวเลือกนี้มีผลเล็กน้อยต่อ performance และ\nจะเพิ่มโหลดให้การเชื่อมต่อของคุณ (สูงสุดประมาณ\nอัปโหลด 10 kiB/s และดาวน์โหลด 100 kiB/s). การใช้\nการเชื่อมต่อดาวน์โหลดจะเพิ่มตามจำนวนผู้เล่นใน squad\nที่เปิดแชร์ live stats; การใช้อัปโหลด\nจะไม่เพิ่ม.
live_stats_budget_mode=ส่งเฉพาะชุด event ขั้นต่ำไปยัง peer. วิธีนี้ลด\nปริมาณ bandwidth อัปโหลดที่ addon ใช้. Stats ฮีล\nที่แสดงจะยังแม่นยำ แต่เวลาใน combat อาจ\nคลาดเล็กน้อยเมื่อ peer ดูระหว่าง combat. หาก peer\nใช้ addon เวอร์ชันเก่ากว่าที่รองรับตัวเลือกนี้\nเวลาใน combat อาจคลาดมากแม้\nencounter จะจบแล้ว. ตัวเลือกนี้ไม่ลด\nbandwidth ดาวน์โหลด ลดเฉพาะ bandwidth อัปโหลด. เมื่อเปิด\nตัวเลือกนี้ การใช้อัปโหลดที่คาดไว้คือ <1kiB/s.
live_stats_disable_encryption=โดยค่าเริ่มต้น ข้อความทั้งหมดไป/กลับเซิร์ฟเวอร์แชร์ live stats\nจะเข้ารหัสด้วย TLS. ตัวเลือกนี้ปิดการเข้ารหัส ซึ่ง\nอาจช่วยเลี่ยงปัญหากับ software ความปลอดภัยบางตัว,\nหรือลดการใช้ CPU ของ live stats sharing.
sharing_hotkey=ค่าตัวเลข (virtual key code) ของปุ่ม\nที่ใช้สลับเปิด/ปิด live stats sharing
evtc_rpc_server=เซิร์ฟเวอร์สำหรับการสื่อสาร evtc_rpc\n(ให้ผู้เล่นอื่นใน squad เห็น stats ฮีลของคุณได้).\ncombat event ฝั่ง local ทั้งหมดจะถูกส่งไปเซิร์ฟเวอร์นี้,\nจึงควรแน่ใจว่าไว้ใจเซิร์ฟเวอร์ได้.
reset_options=รีเซ็ตตัวเลือก global และตัวเลือกเฉพาะหน้าต่างทั้งหมดกลับเป็นค่าเริ่มต้น.

