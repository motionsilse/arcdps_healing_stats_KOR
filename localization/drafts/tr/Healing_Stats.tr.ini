[tooltips]
details_entry_format=Gösterilen veri biçimi (istatistikler satır başınadır).\n{1}: İyileştirme\n{2}: Tikler\n{3}: Castler (henüz uygulanmadı)\n{4}: Saniye başına iyileştirme\n{5}: Tik başına iyileştirme\n{6}: Cast başına iyileştirme (henüz uygulanmadı)\n{7}: Toplam iyileştirme yüzdesi\n
data_source=Bu pencerede hangi verinin gösterileceğini belirler
sort_order='Hedefler' ve 'Yetenekler' bölümlerinde hedeflerin ve yeteneklerin nasıl sıralanacağını belirler.
combat_end=Savaş sonunu\n(ve sonuç olarak savaş süresini) belirlemek için ne kullanılacağını seçer
draw_bars=Her satırın altına, değerinin en büyük satıra oranını\ngösteren renkli bir bar çizer
short_name=Bu pencerenin "heal stats" menüsünde gösterileceği ad
max_name_length=Gösterilen adları bu karakter sayısına kırpar. 0 devre dışı, -1 gizler
min_displayed=Bu pencerede gösterilecek en az veri satırı.
max_displayed=Bu pencerede gösterilecek en fazla veri satırı. Sınır yok için 0
stats_format_with_percent=Gösterilen veri biçimi (istatistikler satır başınadır).\n{1}: İyileştirme\n{2}: Tikler\n{3}: Castler (henüz uygulanmadı)\n{4}: Saniye başına iyileştirme\n{5}: Tik başına iyileştirme\n{6}: Cast başına iyileştirme (henüz uygulanmadı)\n{7}: Toplam iyileştirme yüzdesi
stats_format=Gösterilen veri biçimi (istatistikler satır başınadır).\n{1}: İyileştirme\n{2}: Tikler\n{3}: Castler (henüz uygulanmadı)\n{4}: Saniye başına iyileştirme\n{5}: Tik başına iyileştirme\n{6}: Cast başına iyileştirme (henüz uygulanmadı)
title_bar_format=Bu pencerenin başlığı için biçim.\n{1}: Toplam iyileştirme\n{2}: Toplam tik\n{3}: Toplam cast (henüz uygulanmadı)\n{4}: Saniye başına iyileştirme\n{5}: Tik başına iyileştirme\n{6}: Cast başına iyileştirme (henüz uygulanmadı)\n{7}: Savaş süresi
title_bar_format_totals=Bu pencerenin başlığı için biçim.\n{1}: Savaş süresi
window_width=Genişliği dinamik yeniden boyutlandırmak için 0 yap
window_hotkey=Bu pencereyi açıp kapatmak için kullanılan tuşun\nsayısal değeri (sanal tuş kodu)
debug_mode=Hedef ve yetenek adlarına debug verisi ekler.\nOlası hesaplama sorunları için ekran görüntüsü almadan önce açın.
debug_logging=Kapalı değilse, seçili log seviyesinde loglamayı açar.\nLoglar addons\\logs\\arcdps_healing_stats\\ içine kaydedilir. Loglama\nperformansı az da olsa etkiler.
enable_live_stats_sharing=Squad'ındaki diğer oyuncularla iyileştirme istatistiklerini canlı\npaylaşır. Bu, merkezi bir sunucu üzerinden yapılır\n(aşağıdaki seçeneğe bakın). Canlı paylaşımı açtıktan sonra,\ntüm squad üyeleri doğru algılansın diye harita instance'ı\ndeğişene kadar düzgün çalışmayabilir.\n\nDiğer oyunculardan gelen istatistikler,\nveri kaynağı "%s"\nolarak ayarlanmış bir Heal Stats penceresinde görülebilir\n\nBu seçeneği açmak performansı az da olsa etkiler ve\nbağlantınıza ek yük bindirir (en fazla yaklaşık 10 kiB/s upload\nve 100 kiB/s download). Squad'ınızda canlı istatistik paylaşımı açık\noyuncu sayısı arttıkça download kullanımı artar; upload kullanımı\nartmaz.
live_stats_budget_mode=Peer'lara yalnızca en küçük olay alt kümesini gönderir. Bu,\neklentinin kullandığı upload bant genişliğini azaltır. Gösterilen\niyileştirme istatistikleri yine doğru olur, ancak savaş sırasında peer'lar\nsavaş süresini biraz yanlış görebilir. Peer, bu seçenek desteğinden daha\neski bir eklenti sürümü kullanıyorsa savaş bittikten sonra bile savaş süresi\nbelirgin biçimde yanlış olabilir. Bu seçenek download bant genişliğini azaltmaz,\nyalnızca upload bant genişliğini azaltır. Bu seçenek\naçıkken beklenen\nupload kullanımı <1kiB/s olur.
live_stats_disable_encryption=Varsayılan olarak, canlı istatistik paylaşımı sunucusuna giden ve sunucudan\ngelen tüm mesajlar TLS ile şifrelenir. Bu seçenek şifrelemeyi kapatır. Bu,\nbazı güvenlik yazılımlarıyla çakışmaları önlemek veya canlı istatistik\npaylaşımının CPU kullanımını azaltmak için yararlı olabilir.
sharing_hotkey=Canlı istatistik paylaşımını açıp kapatmak için kullanılan tuşun\nsayısal değeri (sanal tuş kodu)
evtc_rpc_server=evtc_rpc iletişimi için kullanılacak sunucu\n(squad'ındaki diğer oyuncuların iyileştirme istatistiklerini görmesini sağlar).\nTüm yerel savaş olayları bu sunucuya gönderilir,\nbu yüzden sunucuya güvendiğinizden emin olun.
reset_options=Tüm genel seçenekleri ve pencereye özel seçenekleri varsayılanlarına döndürür.

