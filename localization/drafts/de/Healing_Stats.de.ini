[tooltips]
details_entry_format=Format der angezeigten Daten (Statistiken pro Eintrag).\n{1}: Heilung\n{2}: Ticks\n{3}: Casts (noch nicht implementiert)\n{4}: Heilung pro Sekunde\n{5}: Heilung pro Tick\n{6}: Heilung pro Cast (noch nicht implementiert)\n{7}: Anteil an der Gesamtheilung\n
data_source=Legt fest, welche Daten im Fenster angezeigt werden
sort_order=Legt fest, wie Ziele und Fertigkeiten in den Bereichen 'Ziele' und 'Fertigkeiten' sortiert werden.
combat_end=Legt fest, was zum Bestimmen des Kampfendes\n(und damit der Zeit im Kampf) verwendet wird
draw_bars=Zeigt unter jedem Eintrag einen farbigen Balken, der den Wert\ndieses Eintrags im Verhältnis zum größten Eintrag darstellt
short_name=Name, mit dem dieses Fenster im "Heal Stats"-Menü angezeigt wird
max_name_length=Angezeigte Namen auf diese Zeichenanzahl kürzen. 0 deaktiviert, -1 blendet aus
min_displayed=Minimale Anzahl an Datenzeilen, die in diesem Fenster angezeigt werden.
max_displayed=Maximale Anzahl an Datenzeilen, die in diesem Fenster angezeigt werden. 0 bedeutet kein Limit
stats_format_with_percent=Format der angezeigten Daten (Statistiken pro Eintrag).\n{1}: Heilung\n{2}: Ticks\n{3}: Casts (noch nicht implementiert)\n{4}: Heilung pro Sekunde\n{5}: Heilung pro Tick\n{6}: Heilung pro Cast (noch nicht implementiert)\n{7}: Anteil an der Gesamtheilung
stats_format=Format der angezeigten Daten (Statistiken pro Eintrag).\n{1}: Heilung\n{2}: Ticks\n{3}: Casts (noch nicht implementiert)\n{4}: Heilung pro Sekunde\n{5}: Heilung pro Tick\n{6}: Heilung pro Cast (noch nicht implementiert)
title_bar_format=Format für den Titel dieses Fensters.\n{1}: Gesamtheilung\n{2}: Ticks gesamt\n{3}: Casts gesamt (noch nicht implementiert)\n{4}: Heilung pro Sekunde\n{5}: Heilung pro Tick\n{6}: Heilung pro Cast (noch nicht implementiert)\n{7}: Zeit im Kampf
title_bar_format_totals=Format für den Titel dieses Fensters.\n{1}: Zeit im Kampf
window_width=0 für dynamische Breitenanpassung
window_hotkey=Numerischer Wert (virtueller Tastencode) für die Taste,\nmit der dieses Fenster geöffnet und geschlossen wird
debug_mode=Fügt Debug-Daten in Ziel- und Fertigkeitsnamen ein.\nVor Screenshots möglicher Berechnungsprobleme aktivieren.
debug_logging=Wenn nicht auf "aus" gesetzt, wird Logging mit dem gewählten Log-Level aktiviert.\nLogs werden in addons\\logs\\arcdps_healing_stats\\ gespeichert. Logging\nhat geringe Auswirkungen auf die Performance.
enable_live_stats_sharing=Ermöglicht das Live-Teilen von Heilungsstatistiken mit anderen\nSpielern in deinem Einsatztrupp. Dies läuft über einen zentralen Server\n(siehe Option unten). Nach dem Aktivieren funktioniert das Live-Teilen\nevtl. erst nach einem Wechsel der Karteninstanz korrekt, damit alle\nEinsatztruppmitglieder richtig erkannt werden.\n\nVon anderen Spielern geteilte Statistiken können in einem\nHeal-Stats-Fenster angezeigt werden, dessen Datenquelle auf "%s" steht\n\nDiese Option hat geringe Auswirkungen auf die Performance und\nbelastet deine Verbindung zusätzlich (maximal etwa 10 kiB/s Upload\nund 100 kiB/s Download). Die Download-Nutzung steigt, je mehr Spieler\nim Einsatztrupp Live-Stats-Sharing aktiviert haben; die Upload-Nutzung\nsteigt\nnicht.
live_stats_budget_mode=Sendet nur eine minimale Teilmenge von Events an Peers. Das reduziert\ndie vom Addon genutzte Upload-Bandbreite. Die angezeigten Heilungs-\nstatistiken bleiben korrekt, aber die Zeit im Kampf kann\nfür Peers im laufenden Kampf leicht falsch sein. Nutzt der Peer\neine Addon-Version ohne Unterstützung für diese\nOption, kann die Zeit im Kampf auch nach dem Ende\nsehr falsch sein. Diese Option reduziert nicht die\nDownload-Bandbreite, sondern nur den Upload. Mit dieser\nOption liegt die erwartete Upload-Nutzung bei <1kiB/s.
live_stats_disable_encryption=Standardmäßig werden alle Nachrichten zum und vom Live-Stats-Sharing-Server\nmit TLS verschlüsselt. Diese Option deaktiviert die Verschlüsselung. Dies\nkann helfen, Konflikte mit bestimmter Sicherheitssoftware zu vermeiden,\noder die CPU-Nutzung von Live-Stats-Sharing zu reduzieren.
sharing_hotkey=Numerischer Wert (virtueller Tastencode) für die Taste,\nmit der Live-Stats-Sharing ein- und ausgeschaltet wird
evtc_rpc_server=Server für die evtc_rpc-Kommunikation\n(erlaubt anderen Spielern im Einsatztrupp, deine Heilungsstatistiken zu sehen).\nAlle lokalen Kampfereignisse werden an diesen Server gesendet,\nalso stelle sicher, dass du dem Server vertraust.
reset_options=Setzt alle globalen Optionen und fensterspezifischen Optionen auf ihre Standardwerte zurück.

