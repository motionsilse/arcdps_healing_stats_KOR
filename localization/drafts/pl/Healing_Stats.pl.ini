[tooltips]
details_entry_format=Format wyświetlanych danych (statystyki są dla wpisu).\n{1}: Leczenie\n{2}: Tiki\n{3}: Użycia (jeszcze niezaimplementowane)\n{4}: Leczenie na sekundę\n{5}: Leczenie na tik\n{6}: Leczenie na użycie (jeszcze niezaimplementowane)\n{7}: Procent całego leczenia\n
data_source=Określa, jakie dane są pokazywane w oknie
sort_order=Określa, jak cele i umiejętności są sortowane w sekcjach "Cele" i "Umiejętności".
combat_end=Określa, czego używać do ustalania końca\nwalki (a więc także czasu w walce)
draw_bars=Pokazuje kolorowy pasek pod każdym wpisem, oznaczający wartość\ntego wpisu względem największego wpisu
short_name=Nazwa używana dla tego okna w menu "Statystyki leczenia"
max_name_length=Przytnij wyświetlane nazwy do tylu znaków. Ustaw 0, aby wyłączyć, -1, aby ukryć
min_displayed=Minimalna liczba wierszy danych pokazywanych w tym oknie.
max_displayed=Maksymalna liczba wierszy danych pokazywanych w tym oknie. Ustaw 0, aby nie ograniczać
stats_format_with_percent=Format wyświetlanych danych (statystyki są dla wpisu).\n{1}: Leczenie\n{2}: Tiki\n{3}: Użycia (jeszcze niezaimplementowane)\n{4}: Leczenie na sekundę\n{5}: Leczenie na tik\n{6}: Leczenie na użycie (jeszcze niezaimplementowane)\n{7}: Procent całego leczenia
stats_format=Format wyświetlanych danych (statystyki są dla wpisu).\n{1}: Leczenie\n{2}: Tiki\n{3}: Użycia (jeszcze niezaimplementowane)\n{4}: Leczenie na sekundę\n{5}: Leczenie na tik\n{6}: Leczenie na użycie (jeszcze niezaimplementowane)
title_bar_format=Format tytułu tego okna.\n{1}: Całe leczenie\n{2}: Całkowite tiki\n{3}: Całkowite użycia (jeszcze niezaimplementowane)\n{4}: Leczenie na sekundę\n{5}: Leczenie na tik\n{6}: Leczenie na użycie (jeszcze niezaimplementowane)\n{7}: Czas w walce
title_bar_format_totals=Format tytułu tego okna.\n{1}: Czas w walce
window_width=Ustaw 0, aby szerokość dopasowywała się dynamicznie
window_hotkey=Wartość liczbowa (kod klawisza wirtualnego) klawisza\nużywanego do otwierania i zamykania tego okna
debug_mode=Dodaje dane debugowania do nazw celów i umiejętności.\nWłącz przed robieniem zrzutów ekranu możliwych problemów z obliczeniami.
debug_logging=Jeśli nie ustawiono off, włącza logowanie na wybranym poziomie.\nLogi są zapisywane w addons\\logs\\arcdps_healing_stats\\. Logowanie\nbędzie miało mały wpływ na wydajność.
enable_live_stats_sharing=Włącza udostępnianie statystyk leczenia na żywo\ninnym graczom w twoim składzie. Działa to przez centralny\nserwer\n(zobacz opcję poniżej). Po włączeniu udostępniania na żywo może\nnie działać poprawnie do czasu zmiany instancji mapy, aby wszyscy\nczłonkowie składu zostali poprawnie wykryci.\n\nStatystyki udostępnione przez innych graczy można zobaczyć w\noknie statystyk leczenia ze źródłem danych ustawionym na "%s"\n\nWłączenie tej opcji ma mały wpływ na wydajność i dodatkowo\nobciąży połączenie (maksymalnie około 10 kiB/s wysyłania i\n100 kiB/s pobierania). Zużycie pobierania rośnie wraz z liczbą\ngraczy w składzie z włączonym udostępnianiem statystyk na żywo,\nzużycie wysyłania nie rośnie.
live_stats_budget_mode=Wysyła do innych tylko minimalny podzbiór zdarzeń.\nZmniejsza to\nilość pasma wysyłania używaną przez dodatek. Pokazywane statystyki\nleczenia nadal będą dokładne, ale czas w walce widziany przez innych\npodczas walki może być nieco błędny. Jeśli inny gracz używa wersji\ndodatku starszej niż obsługa tej opcji, czas w walce może być znacznie\nbłędny nawet po zakończeniu starcia. Ta opcja nie zmniejsza zużycia\npobierania, tylko zużycie wysyłania. Po włączeniu tej opcji oczekiwane\nzużycie wysyłania wynosi <1kiB/s.
live_stats_disable_encryption=Domyślnie wszystkie wiadomości do i z serwera udostępniania statystyk\nna żywo są szyfrowane za pomocą TLS. Ta opcja wyłącza szyfrowanie. Może\nto pomóc uniknąć konfliktów z niektórym oprogramowaniem zabezpieczającym\nalbo zmniejszyć użycie CPU przez udostępnianie statystyk na żywo.
sharing_hotkey=Wartość liczbowa (kod klawisza wirtualnego) klawisza\nużywanego do włączania i wyłączania udostępniania statystyk na żywo
evtc_rpc_server=Serwer używany do komunikacji evtc_rpc\n(pozwala innym graczom w twoim składzie widzieć twoje statystyki leczenia).\nWszystkie lokalne zdarzenia walki będą wysyłane na ten serwer,\nwięc upewnij się, że mu ufasz.
reset_options=Przywraca domyślne wartości wszystkich opcji globalnych i opcji poszczególnych okien.

