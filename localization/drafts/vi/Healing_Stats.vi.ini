[tooltips]
details_entry_format=Định dạng dữ liệu hiển thị (stats tính theo từng dòng).\n{1}: Hồi máu\n{2}: Tick\n{3}: Cast (chưa triển khai)\n{4}: Hồi máu mỗi giây\n{5}: Hồi máu mỗi tick\n{6}: Hồi máu mỗi cast (chưa triển khai)\n{7}: Phần trăm tổng hồi máu\n
data_source=Chọn dữ liệu được hiển thị trong cửa sổ
sort_order=Chọn cách sắp xếp mục tiêu và kỹ năng trong mục 'Mục tiêu' và 'Kỹ năng'.
combat_end=Chọn mốc dùng để xác định kết thúc\ngiao tranh (và theo đó là thời gian giao tranh)
draw_bars=Hiển thị thanh màu dưới mỗi dòng, thể hiện giá trị của\ndòng đó so với dòng lớn nhất
short_name=Tên dùng để đại diện cửa sổ này trong menu "heal stats"
max_name_length=Cắt tên hiển thị xuống số ký tự này. Đặt 0 để tắt, -1 để ẩn
min_displayed=Số dòng dữ liệu tối thiểu hiển thị trong cửa sổ này.
max_displayed=Số dòng dữ liệu tối đa hiển thị trong cửa sổ này. Đặt 0 để không giới hạn
stats_format_with_percent=Định dạng dữ liệu hiển thị (stats tính theo từng dòng).\n{1}: Hồi máu\n{2}: Tick\n{3}: Cast (chưa triển khai)\n{4}: Hồi máu mỗi giây\n{5}: Hồi máu mỗi tick\n{6}: Hồi máu mỗi cast (chưa triển khai)\n{7}: Phần trăm tổng hồi máu
stats_format=Định dạng dữ liệu hiển thị (stats tính theo từng dòng).\n{1}: Hồi máu\n{2}: Tick\n{3}: Cast (chưa triển khai)\n{4}: Hồi máu mỗi giây\n{5}: Hồi máu mỗi tick\n{6}: Hồi máu mỗi cast (chưa triển khai)
title_bar_format=Định dạng tiêu đề cửa sổ này.\n{1}: Tổng hồi máu\n{2}: Tổng tick\n{3}: Tổng cast (chưa triển khai)\n{4}: Hồi máu mỗi giây\n{5}: Hồi máu mỗi tick\n{6}: Hồi máu mỗi cast (chưa triển khai)\n{7}: Thời gian giao tranh
title_bar_format_totals=Định dạng tiêu đề cửa sổ này.\n{1}: Thời gian giao tranh
window_width=Đặt 0 để tự đổi độ rộng
window_hotkey=Giá trị số (mã phím ảo) cho phím\ndùng để mở và đóng cửa sổ này
debug_mode=Thêm dữ liệu debug vào tên mục tiêu và kỹ năng.\nBật trước khi chụp ảnh lỗi tính toán có thể xảy ra.
debug_logging=Nếu không đặt là tắt, bật ghi log ở cấp log đã chọn.\nLog được lưu trong addons\\logs\\arcdps_healing_stats\\. Ghi log\nsẽ ảnh hưởng nhỏ đến hiệu năng.
enable_live_stats_sharing=Bật gửi stats healing live với người chơi khác\ntrong squad. Tính năng này chạy qua một máy chủ trung tâm\n(xem tùy chọn bên dưới). Sau khi bật, tính năng có thể chưa\nhoạt động đúng cho đến khi đổi instance bản đồ để mọi thành viên\nsquad được nhận diện đúng.\n\nStats từ người chơi khác có thể xem trong một\ncửa sổ heal stats có nguồn dữ liệu đặt thành "%s"\n\nBật tùy chọn này có ảnh hưởng nhỏ đến hiệu năng và\nsẽ tạo thêm tải cho kết nối mạng (tối đa khoảng\n10 kiB/s upload và 100 kiB/s download). Lượng dùng\nkết nối download tăng khi càng nhiều người trong squad\nbật chia sẻ stats live; lượng dùng kết nối upload\nthì không tăng.
live_stats_budget_mode=Chỉ gửi tập sự kiện tối thiểu tới peers. Điều này giảm\nbăng thông upload addon sử dụng. Stats healing hiển thị\nvẫn chính xác, nhưng thời gian giao tranh có thể\nhơi lệch khi peers xem trong lúc đang đánh. Nếu peer\nđang dùng phiên bản addon cũ hơn hỗ trợ tùy chọn này,\nthì thời gian giao tranh có thể lệch nhiều ngay cả\nsau khi encounter kết thúc. Tùy chọn này không giảm\nbăng thông download, chỉ giảm băng thông upload. Khi bật\ntùy chọn này, mức upload dự kiến là <1kiB/s.
live_stats_disable_encryption=Mặc định mọi tin nhắn tới và từ máy chủ chia sẻ stats live\nđều được mã hóa bằng TLS. Tùy chọn này tắt mã hóa. Điều này\ncó thể hữu ích để tránh xung đột với một số phần mềm bảo mật,\nhoặc giảm CPU cho chia sẻ stats live.
sharing_hotkey=Giá trị số (mã phím ảo) cho phím\ndùng để bật/tắt chia sẻ stats live
evtc_rpc_server=Máy chủ dùng cho giao tiếp evtc_rpc\n(cho phép người chơi khác trong squad thấy stats healing của bạn).\nMọi sự kiện combat cục bộ sẽ được gửi tới máy chủ này,\nvì vậy hãy chắc là bạn tin máy chủ.
reset_options=Đưa mọi tùy chọn toàn cục và tùy chọn riêng của cửa sổ về mặc định.

