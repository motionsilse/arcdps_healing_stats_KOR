[tooltips]
details_entry_format=Formato dos dados exibidos (estatísticas por entrada).\n{1}: Cura\n{2}: Ticks\n{3}: Casts (ainda não implementado)\n{4}: Cura por segundo\n{5}: Cura por tick\n{6}: Cura por cast (ainda não implementado)\n{7}: Percentual da cura total\n
data_source=Define quais dados são mostrados na janela
sort_order=Define como alvos e habilidades são classificados nas seções 'Alvos' e 'Habilidades'.
combat_end=Define o que será usado para determinar o fim\ndo combate (e, portanto, o tempo em combate)
draw_bars=Mostra uma barra colorida sob cada entrada indicando o valor\nda entrada em proporcao a maior entrada
short_name=Nome usado para representar esta janela no menu "Stats de Cura"
max_name_length=Trunca nomes exibidos para este número de caracteres. Use 0 para desativar, -1 para ocultar
min_displayed=Quantidade mínima de linhas de dados a mostrar nesta janela.
max_displayed=Quantidade máxima de linhas de dados a mostrar nesta janela. Use 0 para sem limite
stats_format_with_percent=Formato dos dados exibidos (estatísticas por entrada).\n{1}: Cura\n{2}: Ticks\n{3}: Casts (ainda não implementado)\n{4}: Cura por segundo\n{5}: Cura por tick\n{6}: Cura por cast (ainda não implementado)\n{7}: Percentual da cura total
stats_format=Formato dos dados exibidos (estatísticas por entrada).\n{1}: Cura\n{2}: Ticks\n{3}: Casts (ainda não implementado)\n{4}: Cura por segundo\n{5}: Cura por tick\n{6}: Cura por cast (ainda não implementado)
title_bar_format=Formato do título desta janela.\n{1}: Cura total\n{2}: Ticks totais\n{3}: Casts totais (ainda não implementado)\n{4}: Cura por segundo\n{5}: Cura por tick\n{6}: Cura por cast (ainda não implementado)\n{7}: Tempo em combate
title_bar_format_totals=Formato do título desta janela.\n{1}: Tempo em combate
window_width=Use 0 para redimensionar a largura dinamicamente
window_hotkey=Valor numérico (código de tecla virtual) da tecla\nusada para abrir e fechar esta janela
debug_mode=Inclui dados de debug em nomes de alvos e habilidades.\nAtive antes de fazer screenshots de possíveis problemas de cálculo.
debug_logging=Se não estiver desligado, ativa log no nível especificado.\nLogs são salvos em addons\\logs\\arcdps_healing_stats\\. O log\nterá pequeno impacto no desempenho.
enable_live_stats_sharing=Ativa o compartilhamento ao vivo de estatísticas de cura com outros\njogadores do seu esquadrão. Isso usa um servidor central\n(veja a opção abaixo). Depois de ativar o compartilhamento, pode não\nfuncionar bem até você trocar de instância de mapa para que todos os\nmembros do esquadrão sejam detectados corretamente.\n\nAs stats recebidas de outros jogadores podem ser vistas em uma\njanela de stats de cura com a fonte de dados definida como "%s"\n\nAtivar esta opção tem pequeno impacto no desempenho e\nadiciona carga à sua conexão (máximo de cerca de\n10 kiB/s de upload e 100 kiB/s de download). O uso de download\naumenta quanto mais jogadores do esquadrão tiverem stats ao vivo\nativadas; o uso de upload não\naumenta.
live_stats_budget_mode=Envia aos pares apenas um subconjunto mínimo de eventos. Isso reduz\na largura de banda de upload usada pelo addon. As estatísticas de\ncura exibidas continuam corretas, mas o tempo em combate pode ficar\num pouco errado quando visto pelos pares durante o combate. Se o par\nusar uma versão do addon anterior ao suporte desta opção, o tempo em\ncombate pode ficar bem errado mesmo depois do encontro terminar. Esta\nopção não reduz o uso de download, apenas o uso de upload. Com esta\nopção ativada, o upload esperado\né <1kiB/s.
live_stats_disable_encryption=Por padrão, todas as mensagens de/para o servidor de stats ao vivo\nsão criptografadas com TLS. Esta opção desativa a criptografia. Isso\npode ajudar a evitar conflitos com alguns softwares de segurança,\nou reduzir o uso de CPU das stats ao vivo.
sharing_hotkey=Valor numérico (código de tecla virtual) da tecla\nusada para ativar/desativar stats ao vivo
evtc_rpc_server=Servidor usado para comunicacao evtc_rpc\n(permite que outros jogadores do esquadrao vejam suas stats de cura).\nTodos os eventos locais de combate serao enviados a este servidor,\nentao use apenas servidores confiaveis.
reset_options=Redefine todas as opções globais e específicas de janela para os padrões.

