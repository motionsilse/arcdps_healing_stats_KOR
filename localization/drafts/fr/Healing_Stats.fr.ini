[tooltips]
details_entry_format=Format des données affichées (stats par entrée).\n{1}: Soins\n{2}: Ticks\n{3}: Lancers (pas encore implémenté)\n{4}: Soins par seconde\n{5}: Soins par tick\n{6}: Soins par lancer (pas encore implémenté)\n{7}: Pourcentage des soins totaux\n
data_source=Définit les données affichées dans la fenêtre
sort_order=Définit le tri des cibles et compétences dans les sections 'Cibles' et 'Compétences'.
combat_end=Définit la référence pour déterminer la fin\ndu combat (et donc le temps en combat)
draw_bars=Affiche une barre colorée sous chaque entrée indiquant la valeur\nde cette entrée par rapport à la plus grande
short_name=Nom utilisé pour représenter cette fenêtre dans le menu "stats de soins"
max_name_length=Tronque les noms affichés à ce nombre de caractères. 0 désactive, -1 masque
min_displayed=Nombre minimum de lignes de données à afficher dans cette fenêtre.
max_displayed=Nombre maximum de lignes de données à afficher dans cette fenêtre. 0 = sans limite
stats_format_with_percent=Format des données affichées (stats par entrée).\n{1}: Soins\n{2}: Ticks\n{3}: Lancers (pas encore implémenté)\n{4}: Soins par seconde\n{5}: Soins par tick\n{6}: Soins par lancer (pas encore implémenté)\n{7}: Pourcentage des soins totaux
stats_format=Format des données affichées (stats par entrée).\n{1}: Soins\n{2}: Ticks\n{3}: Lancers (pas encore implémenté)\n{4}: Soins par seconde\n{5}: Soins par tick\n{6}: Soins par lancer (pas encore implémenté)
title_bar_format=Format du titre de cette fenêtre.\n{1}: Soins totaux\n{2}: Total ticks\n{3}: Total lancers (pas encore implémenté)\n{4}: Soins par seconde\n{5}: Soins par tick\n{6}: Soins par lancer (pas encore implémenté)\n{7}: Temps en combat
title_bar_format_totals=Format du titre de cette fenêtre.\n{1}: Temps en combat
window_width=Mettre à 0 pour redimensionner la largeur dynamiquement
window_hotkey=Valeur numérique (code de touche virtuelle) de la touche\nutilisée pour ouvrir et fermer cette fenêtre
debug_mode=Inclut les données de débogage dans les noms de cibles et compétences.\nActivez avant de capturer les problèmes de calcul potentiels.
debug_logging=Si l'option n'est pas désactivée, active la journalisation au niveau indiqué.\nLes logs sont enregistrés dans addons\\logs\\arcdps_healing_stats\\. La journalisation\na un léger impact sur les performances.
enable_live_stats_sharing=Active le partage en direct des statistiques de soins avec les autres\njoueurs de votre escouade. Cela passe par un serveur central\n(voir option ci-dessous). Après activation, le partage peut ne pas\nfonctionner correctement avant un changement d'instance de carte,\nafin que tous les membres de l'escouade soient détectés.\n\nLes stats reçues des autres joueurs sont visibles dans une\nfenêtre de stats de soins dont la source de données est "%s"\n\nActiver cette option a un léger impact sur les performances et\najoute de la charge à votre connexion (maximum environ 10 kiB/s\nen envoi et 100 kiB/s en réception). L'usage en réception augmente\navec le nombre de joueurs de votre escouade ayant activé le partage\nen direct, l'usage en envoi ne\nchange pas.
live_stats_budget_mode=Envoie seulement un sous-ensemble minimal d'événements aux pairs. Cela réduit\nla bande passante d'envoi utilisée par l'addon. Les statistiques de soins\naffichées restent exactes, mais le temps en combat peut être légèrement faux\nvu par les pairs pendant le combat. Si le pair utilise une version de l'addon\nantérieure à cette option, le temps en combat peut être très faux même\naprès la fin de la rencontre. Cette option ne réduit pas la bande passante\nde réception, seulement celle d'envoi. Avec cette\noption activée, l'envoi attendu\nest <1kiB/s.
live_stats_disable_encryption=Par défaut, tous les messages vers et depuis le serveur de partage de stats\nen direct sont chiffrés avec TLS. Cette option désactive le chiffrement. Elle\npeut aider à éviter les conflits avec certains logiciels de sécurité,\nou à réduire l'usage CPU du partage de stats en direct.
sharing_hotkey=Valeur numérique (code de touche virtuelle) de la touche\nutilisée pour activer/désactiver le partage de stats en direct
evtc_rpc_server=Serveur à utiliser pour la communication evtc_rpc\n(permet aux autres joueurs de votre escouade de voir vos stats de soins).\nTous les événements de combat locaux seront envoyés à ce serveur,\nassurez-vous donc de lui faire confiance.
reset_options=Réinitialise toutes les options globales et propres aux fenêtres à leurs valeurs par défaut.

