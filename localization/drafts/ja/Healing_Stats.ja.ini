[tooltips]
details_entry_format=表示データのフォーマットです (統計は各行単位)。\n{1}: 回復量\n{2}: ティック\n{3}: キャスト (未実装)\n{4}: 回復/s\n{5}: 回復/ティック\n{6}: 回復/キャスト (未実装)\n{7}: 総回復量に対する割合\n
data_source=このウィンドウに表示するデータを決めます
sort_order=「対象」と「スキル」の並び順を決めます。
combat_end=戦闘終了と戦闘時間の判定に使う\n基準を決めます
draw_bars=各行の値が最大行に対してどの程度かを\n色付きバーで表示します
short_name=「回復統計」メニューでこのウィンドウを表す名前です
max_name_length=表示名を指定文字数で切り詰めます。0で無効、-1で非表示
min_displayed=このウィンドウに表示するデータ行の最小数です。
max_displayed=このウィンドウに表示するデータ行の最大数です。0で無制限
stats_format_with_percent=表示データのフォーマットです (統計は各行単位)。\n{1}: 回復量\n{2}: ティック\n{3}: キャスト (未実装)\n{4}: 回復/s\n{5}: 回復/ティック\n{6}: 回復/キャスト (未実装)\n{7}: 総回復量に対する割合
stats_format=表示データのフォーマットです (統計は各行単位)。\n{1}: 回復量\n{2}: ティック\n{3}: キャスト (未実装)\n{4}: 回復/s\n{5}: 回復/ティック\n{6}: 回復/キャスト (未実装)
title_bar_format=このウィンドウのタイトル用フォーマットです。\n{1}: 総回復量\n{2}: 総ティック数\n{3}: 総キャスト数 (未実装)\n{4}: 回復/s\n{5}: 回復/ティック\n{6}: 回復/キャスト (未実装)\n{7}: 戦闘時間
title_bar_format_totals=このウィンドウのタイトル用フォーマットです。\n{1}: 戦闘時間
window_width=0にすると幅を動的にリサイズします
window_hotkey=このウィンドウを開閉するキーの数値です\n(仮想キーコード)
debug_mode=対象名とスキル名にデバッグデータを含めます。\n計算の問題を報告するスクリーンショット撮影前に有効化してください。
debug_logging=オフ以外の場合、指定したログレベルで記録します。\nログは addons\\logs\\arcdps_healing_stats\\ に保存されます。ログ記録は\nパフォーマンスにわずかに影響します。
enable_live_stats_sharing=スクワッド内の他プレイヤーと回復統計を\nリアルタイム共有します。これは中央サーバー経由で動作します\n(下のオプション参照)。有効化後は、全スクワッドメンバーを\n正しく検出するためにマップインスタンスを変更するまで\n正常に動作しない場合があります。\n\n他プレイヤーから共有された統計は、データソースを\n"%s" に設定した回復統計ウィンドウで\n表示できます\n\nこのオプションはパフォーマンスにわずかに影響し、\n通信量を増やします (最大で上り約10 kiB/s、下り100 kiB/s)。\n下り通信量は、スクワッド内でライブ統計共有を有効化した\nプレイヤーが多いほど増えますが、上り通信量は\n増えません。
live_stats_budget_mode=ピアへ最小限のイベントだけを送信します。これにより\nアドオンの上り帯域使用量を減らします。表示される\n回復統計は正確なままですが、戦闘中にピア側で見える\n戦闘時間が少し不正確になる場合があります。ピアがこの\nオプション対応前のバージョンを使っている場合、戦闘後でも\n戦闘時間が大きく不正確になることがあります。このオプションは\n下り帯域使用量を減らさず、上り帯域にのみ影響します。この\nオプションを有効にすると、想定上り使用量は\n<1kiB/s です。
live_stats_disable_encryption=デフォルトでは、ライブ統計共有サーバーとのすべての\n送受信メッセージはTLSで暗号化されます。このオプションは\n暗号化を無効にします。一部のセキュリティソフトとの競合回避や、\nライブ統計共有のCPU使用量削減に役立つ場合があります。
sharing_hotkey=ライブ統計共有をオン/オフするキーの\n数値です (仮想キーコード)
evtc_rpc_server=evtc_rpc通信に使用するサーバーです\n(スクワッド内の他プレイヤーがあなたの回復統計を見られます)。\nすべてのローカル戦闘イベントがこのサーバーへ送信されます。\n信頼できるサーバーか確認してください。
reset_options=すべてのグローバル設定とウィンドウ固有設定をデフォルトに戻します。

