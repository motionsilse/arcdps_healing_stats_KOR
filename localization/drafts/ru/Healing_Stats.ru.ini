[tooltips]
details_entry_format=Формат отображаемых данных (статистика на строку).\n{1}: Хил\n{2}: Тики\n{3}: Касты (пока не реализовано)\n{4}: Хил в секунду\n{5}: Хил за тик\n{6}: Хил за каст (пока не реализовано)\n{7}: Доля общего хила\n
data_source=Выбирает, какие данные показывать в окне
sort_order=Определяет сортировку целей и умений в разделах 'Цели' и 'Умения'.
combat_end=Выбирает, что использовать для определения конца боя\n(и, соответственно, времени в бою)
draw_bars=Показывает цветной бар под каждой строкой; его значение\nпропорционально самой большой строке
short_name=Имя этого окна в меню "Хил-статы"
max_name_length=Обрезать отображаемые имена до этого числа символов. 0 - не обрезать, -1 - скрыть
min_displayed=Минимальное число строк данных для показа в этом окне.
max_displayed=Максимальное число строк данных для показа в этом окне. 0 - без лимита
stats_format_with_percent=Формат отображаемых данных (статистика на строку).\n{1}: Хил\n{2}: Тики\n{3}: Касты (пока не реализовано)\n{4}: Хил в секунду\n{5}: Хил за тик\n{6}: Хил за каст (пока не реализовано)\n{7}: Доля общего хила
stats_format=Формат отображаемых данных (статистика на строку).\n{1}: Хил\n{2}: Тики\n{3}: Касты (пока не реализовано)\n{4}: Хил в секунду\n{5}: Хил за тик\n{6}: Хил за каст (пока не реализовано)
title_bar_format=Формат заголовка этого окна.\n{1}: Всего хил\n{2}: Всего тиков\n{3}: Всего кастов (пока не реализовано)\n{4}: Хил в секунду\n{5}: Хил за тик\n{6}: Хил за каст (пока не реализовано)\n{7}: Время в бою
title_bar_format_totals=Формат заголовка этого окна.\n{1}: Время в бою
window_width=0 включает динамическую ширину
window_hotkey=Числовое значение (код виртуальной клавиши) для клавиши,\nкоторая открывает и закрывает это окно
debug_mode=Добавляет отладочные данные к именам целей и умений.\nВключите перед скриншотами возможных проблем расчета.
debug_logging=Если не выключено, включает логирование с выбранным уровнем.\nЛоги сохраняются в addons\\logs\\arcdps_healing_stats\\. Логирование\nнемного влияет на производительность.
enable_live_stats_sharing=Включает live-обмен статистикой исцеления с другими\nигроками в вашем отряде. Это работает через центральный сервер\n(см. опцию ниже). После включения live-обмена он может\nработать некорректно, пока вы не смените экземпляр карты, чтобы все\nчлены отряда были корректно обнаружены.\n\nСтатистику, полученную от других игроков, можно смотреть через\nокно "Хил-статы", где источник данных задан как "%s"\n\nВключение этой опции немного влияет на производительность и\nдобавляет нагрузку на соединение (максимум около 10 kiB/s вверх\nи 100 kiB/s вниз).\nРасход входящего канала растет, чем больше\nигроков в отряде включили live-обмен статистикой; расход исходящего канала\nне растет.
live_stats_budget_mode=Отправляет пирам только минимальный набор событий. Это снижает\nиспользование исходящего канала аддоном. Показанная статистика\nисцеления все равно будет точной, но время в бою может\nбыть слегка неверным для пиров во время боя. Если пир\nиспользует версию аддона без поддержки этой\nопции, время в бою может быть сильно неверным даже\nпосле завершения боя. Эта опция не снижает\nрасход входящего канала, только исходящего. При включенной\nопции ожидаемый расход исходящего канала <1kiB/s.
live_stats_disable_encryption=По умолчанию все сообщения к серверу live stats sharing и от него\nшифруются через TLS. Эта опция отключает шифрование. Это\nможет помочь избежать конфликтов с некоторыми защитными программами\nили снизить нагрузку live stats sharing на CPU.
sharing_hotkey=Числовое значение (код виртуальной клавиши) для клавиши,\nкоторая включает и выключает live stats sharing
evtc_rpc_server=Сервер для evtc_rpc-связи\n(позволяет другим игрокам в отряде видеть вашу статистику исцеления).\nВсе локальные боевые события будут отправляться на этот сервер,\nпоэтому убедитесь, что доверяете ему.
reset_options=Сбрасывает все глобальные и оконные настройки к значениям по умолчанию.

