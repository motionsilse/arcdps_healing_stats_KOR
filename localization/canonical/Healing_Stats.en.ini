[tooltips]
details_entry_format=Format for displayed data (statistics are per entry).\n{1}: Healing\n{2}: Hits\n{3}: Casts (not implemented yet)\n{4}: Healing per second\n{5}: Healing per hit\n{6}: Healing per cast (not implemented yet)\n{7}: Percent of total healing\n
data_source=Decides what data is shown in the window
sort_order=Decides how targets and skills are sorted in the 'Targets' and 'Skills' sections.
combat_end=Decides what should be used for determining combat\nend (and consequently time in combat)
draw_bars=Show a colored bar under each entry signifying what the value of\nthat entry is in proportion to the largest entry
short_name=The name used to represent this window in the "heal stats" menu
max_name_length=Truncate displayed names to this many characters. Set to 0 to disable, -1 to hide
min_displayed=The minimum amount of lines of data to show in this window.
max_displayed=The maximum amount of lines of data to show in this window. Set to 0 for no limit
stats_format_with_percent=Format for displayed data (statistics are per entry).\n{1}: Healing\n{2}: Hits\n{3}: Casts (not implemented yet)\n{4}: Healing per second\n{5}: Healing per hit\n{6}: Healing per cast (not implemented yet)\n{7}: Percent of total healing
stats_format=Format for displayed data (statistics are per entry).\n{1}: Healing\n{2}: Hits\n{3}: Casts (not implemented yet)\n{4}: Healing per second\n{5}: Healing per hit\n{6}: Healing per cast (not implemented yet)
title_bar_format=Format for the title of this window.\n{1}: Total healing\n{2}: Total hits\n{3}: Total casts (not implemented yet)\n{4}: Healing per second\n{5}: Healing per hit\n{6}: Healing per cast (not implemented yet)\n{7}: Time in combat
title_bar_format_totals=Format for the title of this window.\n{1}: Time in combat
window_width=Set to 0 for dynamic resizing of width
window_hotkey=Numerical value (virtual key code) for the key\nused to open and close this window
debug_mode=Includes debug data in target and skill names.\nTurn this on before taking screenshots of potential calculation issues.
debug_logging=If not set to off, enables logging at the specified log level.\nLogs are saved in addons\\logs\\arcdps_healing_stats\\. Logging\nwill have a small impact on performance.
enable_live_stats_sharing=Enables live sharing of healing statistics with other\nplayers in your squad. This is done through a central server\n(see option below). After enabling live sharing, it might not\nwork properly until after changing map instance so all squad\nmembers are properly detected.\n\nThe stats shared from other players can be viewed through a\nheal stats window with its data source set to "%s"\n\nEnabling this option has a small impact on performance, and\nwill put some additional load on your connection (a maximum\nof about 10 kiB/s up and 100 kiB/s down). The download\nconnection usage increases the more players in your squad\nhave live stats sharing enabled, the upload connection usage\ndoes not.
live_stats_budget_mode=Only send a minimal subset of events to peers. This reduces\nthe amount of upload bandwidth used by the addon. Healing\nstatistics shown will still be accurate, but time in combat can\nbe slightly wrong when seen by peers during combat. If the peer\nis using a version of the addon older than support for this\noption, then time in combat can be significantly wrong even\nafter the encounter is over. This option does not reduce the\ndownload bandwidth usage, only upload bandwidth usage. With this\noption enabled, the expected upload connection usage is <1kiB/s.
live_stats_disable_encryption=By default, all messages to and from the live stats sharing server\nare encrypted using TLS. This option disables the encryption. This\nmight be useful to avoid conflicts with some security software,\nor reduce CPU usage of live stats sharing.
sharing_hotkey=Numerical value (virtual key code) for the key\nused to toggle live stats sharing on and off
evtc_rpc_server=Server to use for evtc_rpc communication\n(allows other players in your squad to see your healing stats).\nAll local combat events will be sent to this server,\nso make sure you trust the server.
reset_options=Reset all global options and window-specific options back to their defaults.

