[tooltips]
details_entry_format=행에 표시할 값 형식입니다.\n{1}: 치유량\n{2}: 틱 수\n{3}: 시전 수 (미구현)\n{4}: 치유/초\n{5}: 치유/틱\n{6}: 치유/시전 (미구현)\n{7}: 전체 치유량 비율\n
data_source=이 창에 사용할 데이터 소스를 정합니다
sort_order=대상별/스킬별 목록의 정렬 방식을 정합니다.
combat_end=전투 종료와 전투 시간을 계산할 기준입니다
draw_bars=가장 큰 항목 대비 비율을 각 행 아래의 색상 막대로 표시합니다
short_name=치유 통계 메뉴에 표시될 창 이름입니다
max_name_length=표시 이름을 지정한 글자 수로 자릅니다. 0은 비활성화, -1은 숨김입니다
min_displayed=이 창에 표시할 데이터 줄 수의 최솟값입니다.
max_displayed=이 창에 표시할 데이터 줄 수의 최댓값입니다. 0은 제한 없음입니다
stats_format_with_percent=행에 표시할 값 형식입니다.\n{1}: 치유량\n{2}: 틱 수\n{3}: 시전 수 (미구현)\n{4}: 치유/초\n{5}: 치유/틱\n{6}: 치유/시전 (미구현)\n{7}: 전체 치유량 비율
stats_format=행에 표시할 값 형식입니다.\n{1}: 치유량\n{2}: 틱 수\n{3}: 시전 수 (미구현)\n{4}: 치유/초\n{5}: 치유/틱\n{6}: 치유/시전 (미구현)
title_bar_format=창 제목에 표시할 값 형식입니다.\n{1}: 치유량 합계\n{2}: 총 틱 수\n{3}: 총 시전 수 (미구현)\n{4}: 치유/초\n{5}: 치유/틱\n{6}: 치유/시전 (미구현)\n{7}: 전투 시간
title_bar_format_totals=창 제목에 표시할 값 형식입니다.\n{1}: 전투 시간
window_width=0으로 설정하면 너비를 동적으로 조정합니다
window_hotkey=이 창을 열고 닫는 데 사용할 키의 숫자값입니다\n(가상 키 코드)
debug_mode=대상명과 스킬명에 디버그 데이터를 포함합니다.\n계산 문제를 제보하기 위한 스크린샷을 찍기 전에 켜세요.
debug_logging=off가 아니면 선택한 로그 레벨로 기록합니다.\n로그는 addons\\logs\\arcdps_healing_stats\\에 저장됩니다.\n로그 기록은 성능에 약간 영향을 줍니다.
enable_live_stats_sharing=스쿼드의 다른 애드온 사용자와 치유 통계를 실시간으로 공유합니다.\n이 기능은 중앙 서버를 통해 동작합니다 (아래 옵션 참고).\n활성화한 뒤에는 모든 스쿼드원이 제대로 감지되도록\n맵 인스턴스를 바꾸기 전까지 정상 동작하지 않을 수 있습니다.\n\n다른 플레이어에게서 받은 통계는 데이터 소스를 "%s"로 설정한\n치유 통계 창에서 볼 수 있습니다.\n\n이 옵션은 성능에 약간 영향을 주며 네트워크 사용량을 늘립니다\n(최대 약 업로드 10 kiB/s, 다운로드 100 kiB/s). 다운로드 사용량은\n스쿼드에서 실시간 통계 공유를 켠 플레이어가 많을수록 증가하지만,\n업로드 사용량은 증가하지 않습니다.
live_stats_budget_mode=최소한의 이벤트만 다른 플레이어에게 보냅니다. 애드온의 업로드\n대역폭 사용량을 줄입니다. 표시되는 치유 통계는 여전히 정확하지만,\n전투 중에는 다른 플레이어에게 보이는 전투 시간이 약간 부정확할 수\n있습니다. 상대가 절약 모드 지원 이전 버전의 애드온을 사용 중이면\n전투가 끝난 뒤에도 전투 시간이 크게 부정확할 수 있습니다. 이 옵션은\n다운로드 사용량에는 영향을 주지 않고 업로드에만 영향을 줍니다.\n이 옵션을 켜면 예상 업로드 사용량은 <1kiB/s로 내려갑니다.
live_stats_disable_encryption=기본적으로 실시간 통계 공유 서버와 주고받는 모든 메시지는 TLS로\n암호화됩니다. 이 옵션은 암호화를 끕니다. 일부 보안 프로그램과의\n충돌을 피하거나 실시간 통계 공유의 CPU 사용량을 줄일 때 유용할 수 있습니다.
sharing_hotkey=실시간 통계 공유를 켜고 끄는 데 사용할 키의\n숫자값입니다 (가상 키 코드)
evtc_rpc_server=evtc_rpc 통신에 사용할 서버입니다\n(다른 스쿼드원이 내 치유 통계를 볼 수 있게 합니다).\n모든 로컬 전투 이벤트가 이 서버로 전송됩니다.\n신뢰할 수 있는 서버인지 확인하세요.
reset_options=모든 전역 설정과 창별 설정을 기본값으로 되돌립니다.

